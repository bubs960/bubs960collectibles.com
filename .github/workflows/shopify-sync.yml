name: Build & Shopify Sync

on:
  push:
    branches: [main]
    paths:
      - 'products/**'
      - 'scripts/**'
      - '.github/workflows/shopify-sync.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build product pages
        run: node scripts/build-pages.mjs

      - name: Commit generated pages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add shop/
          if git diff --staged --quiet; then
            echo "No page changes to commit."
          else
            git commit -m "chore: auto-build product pages [skip ci]"
            git push
          fi

      - name: Sync to Shopify
        env:
          SHOPIFY_STORE: ${{ secrets.SHOPIFY_STORE }}
          SHOPIFY_ADMIN_TOKEN: ${{ secrets.SHOPIFY_ADMIN_TOKEN }}
        run: node scripts/sync-shopify.mjs
